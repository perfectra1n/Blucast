name: Build BluCast image
description: >
  Download the proprietary NVIDIA Maxine SDK from an NGC private resource and
  build the BluCast container image (which compiles server.cpp). This mirrors
  the inline NGC pattern NVIDIA uses in its own repos (NVIDIA/ngc-examples) —
  there is no off-the-shelf "setup NGC CLI" marketplace action because the SDK
  is entitlement-gated per account. The image is never pushed.

inputs:
  ngc-api-key:
    description: NGC personal API key (pass secrets.NGC_CLI_API_KEY).
    required: true
  ngc-org:
    description: NGC org that owns the SDK resource (account-specific).
    required: true
  sdk-name:
    description: Private NGC resource name holding the assembled sdk.tar.gz. Fixed convention.
    required: false
    default: blucast-sdk
  sdk-version:
    description: Version of that resource (bump when you re-upload the SDK bundle).
    required: false
    default: "1.0"
  image-tag:
    description: Tag for the built image.
    required: false
    default: blucast:ci

runs:
  using: composite
  steps:
    - name: Install NGC CLI
      shell: bash
      run: |
        curl -sSL -o ngccli.zip "https://ngc.nvidia.com/downloads/ngccli_linux.zip"
        unzip -q ngccli.zip -d "$HOME/ngc"
        chmod +x "$HOME/ngc/ngc-cli/ngc"
        echo "$HOME/ngc/ngc-cli" >> "$GITHUB_PATH"

    - name: Download assembled SDK from NGC private registry
      shell: bash
      # The NGC CLI authenticates from these env vars in headless mode — no
      # interactive `ngc config set` needed (and 3.x dropped its --api-key flag).
      env:
        NGC_CLI_API_KEY: ${{ inputs.ngc-api-key }}
        NGC_CLI_ORG: ${{ inputs.ngc-org }}
        NGC_CLI_FORMAT_TYPE: json
      run: |
        resource="${{ inputs.ngc-org }}/${{ inputs.sdk-name }}:${{ inputs.sdk-version }}"
        ngc registry resource download-version "$resource" --dest ./ngc-sdk
        tarball="$(find ./ngc-sdk -name 'sdk.tar.gz' | head -1)"
        [ -n "$tarball" ] || { echo "::error::sdk.tar.gz not found in the NGC resource."; exit 1; }
        tar -xzf "$tarball"
        test -d sdk/VideoFX && test -d sdk/AudioFX || { echo "::error::sdk/ missing VideoFX/AudioFX."; exit 1; }

    - name: Build the container image (compiles server.cpp; not pushed)
      shell: bash
      run: docker build -f Containerfile -t "${{ inputs.image-tag }}" .
