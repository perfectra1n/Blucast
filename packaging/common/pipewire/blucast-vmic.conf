# BluCast virtual microphone — created declaratively at PipeWire start.
# Installed to /usr/share/pipewire/pipewire-pulse.conf.d/blucast-vmic.conf
#
# A null sink receives processed audio from the BluCast server; a remap-source
# re-exposes its monitor as a selectable "BluCast Virtual Microphone". This
# replaces the old runtime `pactl load-module` calls.
pulse.cmd = [
    { cmd = "load-module" args = "module-null-sink sink_name=BluCast_Mic_Sink rate=48000 sink_properties=device.description=BluCast_Mic_Sink" }
    { cmd = "load-module" args = "module-remap-source source_name=BluCast_Virtual_Microphone master=BluCast_Mic_Sink.monitor source_properties=device.description='BluCast Virtual Microphone'" }
]
